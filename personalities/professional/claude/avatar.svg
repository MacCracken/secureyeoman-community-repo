<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <!-- Warm gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#c4956a"/>
    </linearGradient>
    <!-- Subtle inner glow -->
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <rect width="128" height="128" rx="24" fill="url(#glow)"/>

  <!-- Outer ring of small sparkles — the thinking halo -->
  <g fill="white" opacity="0.3">
    <circle cx="64" cy="14" r="1.5"/>
    <circle cx="88" cy="20" r="1"/>
    <circle cx="104" cy="38" r="1.5"/>
    <circle cx="110" cy="60" r="1"/>
    <circle cx="106" cy="84" r="1.5"/>
    <circle cx="90" cy="104" r="1"/>
    <circle cx="64" cy="114" r="1.5"/>
    <circle cx="38" cy="104" r="1"/>
    <circle cx="22" cy="84" r="1.5"/>
    <circle cx="18" cy="60" r="1"/>
    <circle cx="24" cy="38" r="1.5"/>
    <circle cx="40" cy="20" r="1"/>
  </g>

  <!-- Main sparkle cluster — the Claude mark -->
  <g transform="translate(64,58)" fill="white">
    <!-- Primary four-point star -->
    <path d="M0-28 C3-11 11-3 28 0 11 3 3 11 0 28 -3 11-11 3-28 0-11-3-3-11 0-28Z" opacity="0.95"/>

    <!-- Secondary smaller star, rotated 45deg — creates the 8-point effect -->
    <path d="M0-16 C2-6 6-2 16 0 6 2 2 6 0 16 -2 6-6 2-16 0-6-2-2-6 0-16Z"
          transform="rotate(45)" opacity="0.5"/>

    <!-- Center eye — the warm hollow -->
    <circle cx="0" cy="0" r="4" fill="#d4a574"/>
    <circle cx="0" cy="0" r="2.5" fill="white" opacity="0.6"/>
  </g>

  <!-- Accent sparkles — asymmetric, like thoughts mid-flight -->
  <g fill="white">
    <path d="M0-5 C0.5-2 2-0.5 5 0 2 0.5 0.5 2 0 5-0.5 2-2 0.5-5 0-2-0.5-0.5-2 0-5Z"
          transform="translate(38,34) rotate(15)" opacity="0.6"/>
    <path d="M0-4 C0.4-1.5 1.5-0.4 4 0 1.5 0.4 0.4 1.5 0 4-0.4 1.5-1.5 0.4-4 0-1.5-0.4-0.4-1.5 0-4Z"
          transform="translate(92,42) rotate(-10)" opacity="0.45"/>
    <path d="M0-3.5 C0.3-1.3 1.3-0.3 3.5 0 1.3 0.3 0.3 1.3 0 3.5-0.3 1.3-1.3 0.3-3.5 0-1.3-0.3-0.3-1.3 0-3.5Z"
          transform="translate(44,88) rotate(30)" opacity="0.35"/>
    <path d="M0-3 C0.3-1 1-0.3 3 0 1 0.3 0.3 1 0 3-0.3 1-1 0.3-3 0-1-0.3-0.3-1 0-3Z"
          transform="translate(86,80) rotate(-20)" opacity="0.5"/>
  </g>
</svg>
